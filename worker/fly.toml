# fly.toml app configuration file generated for sirevalue-worker on 2026-04-22T09:30:23-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sirevalue-worker'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  GIT_BRANCH = 'main'
  GIT_REPO_URL = 'https://github.com/YOUR_USER/sirevalue.git'
  OUTPUT_DIR = '/app/data'

[[mounts]]
  source = 'sirevalue_data'
  destination = '/app/data'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
